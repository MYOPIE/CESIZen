<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-logo">
      <span class="logo-icon">◇</span>
      <span class="logo-text">CESIZen</span>
    </div>

    <button class="navbar-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="navbar-menu" [class.active]="isMenuOpen">
      <li><a routerLink="/" routerLinkActive="active" (click)="closeMenu()" [routerLinkActiveOptions]="{ exact: true }">Accueil</a></li>
      <li><a routerLink="/informations" routerLinkActive="active" (click)="closeMenu()">Informations</a></li>
      <li><a routerLink="/activites" routerLinkActive="active" (click)="closeMenu()">Activités de détente</a></li>
      
      <!-- Lien Admin (visible uniquement si connecter admin) -->
      <li *ngIf="currentUser?.role === 'ROLE_ADMIN'">
        <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Panel Admin</a>
      </li>
      
      <!-- Mon Compte / Profil -->
      <li>
        <a routerLink="/compte" routerLinkActive="active" (click)="closeMenu()">
          <ng-container *ngIf="currentUser; else notLogged">
            👤 {{ userDisplayName }}
          </ng-container>
          <ng-template #notLogged>Mon compte</ng-template>
        </a>
      </li>
    </ul>
  </div>
</nav>
