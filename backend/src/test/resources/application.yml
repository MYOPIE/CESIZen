spring:
  datasource:
    url: jdbc:h2:mem:cesizen_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never

  security:
    user:
      name: admin
      password: admin123

app:
  api:
    base-path: /api/v1
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: your-super-secret-key-change-this-in-production-with-a-strong-random-key
    expiration: 86400000
